<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <header>
        <h1 style="text-align: center; color: #46A358;">
            <a href="login.html">Login</a>
            <span style="color: black;">|</span>
            Register
        </h1>
    </header>

    <main>
        <p style="text-align: center;">Enter your email and password to register.</p>
        <form>
            <p style="text-align: center;">
                <input type="text" id="name" placeholder="Username" style="width: 300px; height: 30px;">
            </p>

            <p style="text-align: center;">
                <input type="email" id="email" placeholder="Enter your email address"
                    style="width: 300px; height: 30px;">
            </p>

            <p style="text-align: center;">
                <input type="password" id="password" placeholder="Password" style="width: 300px; height: 30px;">
            </p>

            <p style="text-align: center;">
                <input type="password" id="confirmpassword" placeholder="Confirm Password"
                    style="width: 300px; height: 30px;">
            </p>
            <br>
            <p style="text-align: center;">
                <button type="button" style="width: 300px; height: 40px;"><b>Register</b></button>
            </p>
            <br />

        </form>
    </main>

    <hr width="320" />
    <p style="text-align: center;">Or register with</p>

    <p style="text-align: center;">
        <button type="button" style="width: 300px; height: 40px;">
            <img src="./images/google 1.png" alt="google" width="20">
            Continue with Google
        </button>
    </p>

    <p style="text-align: center;">
        <button type="button" style="width: 300px; height: 40px;">
            <img src="./images/facebook 1.png" alt="facebook" width="20">
            Continue with Facebook
        </button>
    </p>

</body>
</html>
